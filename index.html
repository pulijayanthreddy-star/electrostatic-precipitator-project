<!DOCTYPE html>
<html>

<head>
<title>Electrostatic Precipitator Simulation</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

canvas{
background:white;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Electrostatic Precipitator Simulation</h1>

<p>This simulation shows how charged dust particles move toward collection plates.</p>

<canvas id="sim" width="700" height="300"></canvas>

<script>

const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*150,
y:Math.random()*300,
collected:false
});
}

function draw(){

ctx.clearRect(0,0,700,300);

ctx.fillStyle="black";
ctx.fillText("Dust Inlet",30,20);

ctx.fillStyle="gray";

ctx.fillRect(350,0,5,300);
ctx.fillRect(600,0,5,300);

ctx.fillStyle="red";

for(let p of particles){

if(!p.collected){

p.x += 1.5;

if(p.x > 350){
p.x += (350 - p.x)*0.05;
}

if(Math.abs(p.x-350) < 3){
p.collected = true;
}

}

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();

if(p.x > 690){
p.x = Math.random()*150;
p.y = Math.random()*300;
p.collected=false;
}

}

requestAnimationFrame(draw);
}

draw();

</script>

</body>

</html>
