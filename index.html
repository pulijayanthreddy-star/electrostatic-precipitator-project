<!DOCTYPE html>
<html>
<head>

<title>Electrostatic Precipitator 3D Simulator</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
overflow:hidden;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="panel">

<h3>ESP Control Panel</h3>

Voltage (DC)
<input type="range" id="voltage" min="1" max="100" value="40">

<p>Collected Particles: <span id="count">0</span></p>

<p>Efficiency: <span id="eff">0</span>%</p>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let collected=0
let totalParticles=0

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.set(40,20,60)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

const light=new THREE.PointLight(0xffffff,1)
light.position.set(20,30,20)
scene.add(light)

const chamberGeo=new THREE.BoxGeometry(90,30,30)

const chamberMat=new THREE.MeshBasicMaterial({
color:0x55aaff,
transparent:true,
opacity:0.15
})

const chamber=new THREE.Mesh(chamberGeo,chamberMat)
scene.add(chamber)

const plateGeo=new THREE.BoxGeometry(1,28,22)

const plateMat=new THREE.MeshStandardMaterial({color:0xaaaaaa})

let plates=[]

for(let i=0;i<3;i++){

const plate=new THREE.Mesh(plateGeo,plateMat)

plate.position.x=10 + i*10

scene.add(plate)

plates.push(plate)

}

const wireGeo=new THREE.CylinderGeometry(0.2,0.2,26,16)

const wireMat=new THREE.MeshStandardMaterial({color:0xffff00})

const wire=new THREE.Mesh(wireGeo,wireMat)

wire.rotation.z=Math.PI/2
wire.position.x=-5

scene.add(wire)

let fieldLines=[]

for(let i=0;i<20;i++){

const points=[]

points.push(new THREE.Vector3(-5,Math.random()*20-10,0))
points.push(new THREE.Vector3(10 + Math.random()*20,Math.random()*20-10,0))

const geo=new THREE.BufferGeometry().setFromPoints(points)

const mat=new THREE.LineBasicMaterial({color:0x00ffff})

const line=new THREE.Line(geo,mat)

scene.add(line)

fieldLines.push(line)

}

let arrows=[]

for(let i=0;i<10;i++){

const dir=new THREE.Vector3(1,0,0)

const origin=new THREE.Vector3(-30,i*3-15,0)

const length=5

const arrow=new THREE.ArrowHelper(dir,origin,length,0x00ff00)

scene.add(arrow)

arrows.push(arrow)

}

let particles=[]

function createParticle(){

const geo=new THREE.SphereGeometry(0.35,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xff4444})

const p=new THREE.Mesh(geo,mat)

p.position.x=-40
p.position.y=Math.random()*20-10
p.position.z=Math.random()*20-10

scene.add(p)

particles.push(p)

totalParticles++

}

for(let i=0;i<200;i++) createParticle()

function animate(){

requestAnimationFrame(animate)

controls.update()

let voltage=document.getElementById("voltage").value

particles.forEach(p=>{

p.position.x+=0.35

let field=voltage*0.003

if(p.position.x>-10){

let targetPlate=10

p.position.x+=(targetPlate-p.position.x)*field

p.position.y+=(0-p.position.y)*field*0.25

}

plates.forEach(pl=>{

if(Math.abs(p.position.x-pl.position.x)<0.7){

collected++

document.getElementById("count").innerText=collected

let eff=Math.floor((collected/totalParticles)*100)

document.getElementById("eff").innerText=eff

p.position.x=-40
p.position.y=Math.random()*20-10
p.position.z=Math.random()*20-10

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
