<h1>Electrostatic Precipitator</h1>

<p>This project demonstrates how electrostatic forces remove dust and smoke particles from air.</p>

<h2>Working Principle</h2>
<p>High voltage wires charge particles in air. The charged particles move toward collection plates and stick to them.</p>
